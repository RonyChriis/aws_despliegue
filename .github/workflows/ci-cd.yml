name: CI/CD - Microservicios AWS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:

# ══════════════════════════════════════════
# CI — Build, Test y Push de las 4 imágenes
# ══════════════════════════════════════════

  ci-gatewayservice:
    name: "CI → gatewayservice"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gatewayservice/package-lock.json

      - name: Instalar dependencias
        working-directory: ./gatewayservice
        run: npm ci

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push
        uses: docker/build-push-action@v5
        with:
          context: ./gatewayservice
          push: ${{ github.event_name == 'push' }}
          tags: ronydb/gatewayservice:latest

  ci-usuarioservice:
    name: "CI → usuarioservice"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: usuarioservice/package-lock.json

      - name: Instalar dependencias
        working-directory: ./usuarioservice
        run: npm ci

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push
        uses: docker/build-push-action@v5
        with:
          context: ./usuarioservice
          push: ${{ github.event_name == 'push' }}
          tags: ronydb/usuarioservice:latest

  ci-inventarioservice:
    name: "CI → inventarioservice"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: inventarioservice/package-lock.json

      - name: Instalar dependencias
        working-directory: ./inventarioservice
        run: npm ci

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push
        uses: docker/build-push-action@v5
        with:
          context: ./inventarioservice
          push: ${{ github.event_name == 'push' }}
          tags: ronydb/inventarioservice:latest

  ci-reporteservice:
    name: "CI → reporteservice"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: reporteservice/package-lock.json

      - name: Instalar dependencias
        working-directory: ./reporteservice
        run: npm ci

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push
        uses: docker/build-push-action@v5
        with:
          context: ./reporteservice
          push: ${{ github.event_name == 'push' }}
          tags: ronydb/reporteservice:latest

# ══════════════════════════════════════════
# CD — Deploy al EC2 vía SSH
# ══════════════════════════════════════════

  cd-deploy:
    name: "CD → Deploy EC2"
    runs-on: ubuntu-latest
    needs:
      - ci-gatewayservice
      - ci-usuarioservice
      - ci-inventarioservice
      - ci-reporteservice
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Copiar docker-compose.prod.yml al EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/home/ec2-user/app/"

      - name: Deploy en EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/app

            # Crear archivo .env de producción con los secrets
            cat > .env.prod << EOF
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DB_PASS=${{ secrets.DB_PASS }}
            EOF

            # Descargar imágenes nuevas y levantar
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Limpiar imágenes viejas
            docker image prune -f

            # Verificar estado
            docker compose -f docker-compose.prod.yml ps
