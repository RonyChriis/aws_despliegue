services:

  # ─── BASES DE DATOS ──────────────────────────────────────────
  db-usuarios:
    image: postgres:15-alpine
    container_name: db-usuarios
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: usuarios_db
    volumes:
      - pgdata-usuarios:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-inventario:
    image: postgres:15-alpine
    container_name: db-inventario
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inventario_db
    volumes:
      - pgdata-inventario:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── MICROSERVICIOS ──────────────────────────────────────────
  usuarioservice:
    build: ./usuarioservice
    container_name: usuarioservice
    working_dir: /app
    volumes:
      - ./usuarioservice:/app
      - usuarioservice_node_modules:/app/node_modules
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_HOST: db-usuarios
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: usuarios_db
      CHOKIDAR_USEPOLLING: "true"
    command: npm run start:dev
    depends_on:
      db-usuarios:
        condition: service_healthy
    restart: on-failure

  inventarioservice:
    build: ./inventarioservice
    container_name: inventarioservice
    working_dir: /app
    volumes:
      - ./inventarioservice:/app
      - inventarioservice_node_modules:/app/node_modules
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DB_HOST: db-inventario
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: inventario_db
      USUARIO_SERVICE_URL: http://usuarioservice:3001
      CHOKIDAR_USEPOLLING: "true"
    command: npm run start:dev
    depends_on:
      db-inventario:
        condition: service_healthy
      usuarioservice:
        condition: service_started
    restart: on-failure

  reporteservice:
    build: ./reporteservice
    container_name: reporteservice
    working_dir: /app
    volumes:
      - ./reporteservice:/app
      - reporteservice_node_modules:/app/node_modules
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      INVENTARIO_SERVICE_URL: http://inventarioservice:3002
      USUARIO_SERVICE_URL: http://usuarioservice:3001
      CHOKIDAR_USEPOLLING: "true"
    command: npm run start:dev
    depends_on:
      - inventarioservice
      - usuarioservice
    restart: on-failure

  gatewayservice:
    build: ./gatewayservice
    container_name: gatewayservice
    working_dir: /app
    volumes:
      - ./gatewayservice:/app
      - gatewayservice_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      USUARIO_SERVICE_URL: http://usuarioservice:3001
      INVENTARIO_SERVICE_URL: http://inventarioservice:3002
      REPORTE_SERVICE_URL: http://reporteservice:3003
      CHOKIDAR_USEPOLLING: "true"
    command: npm run start:dev
    depends_on:
      - usuarioservice
      - inventarioservice
      - reporteservice
    restart: on-failure

volumes:
  pgdata-usuarios:
  pgdata-inventario:
  usuarioservice_node_modules:
  inventarioservice_node_modules:
  reporteservice_node_modules:
  gatewayservice_node_modules: